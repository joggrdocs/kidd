name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Debug bin links
        run: |
          echo "=== examples/icons/.bin ==="
          ls -la examples/icons/node_modules/.bin/ 2>&1 || echo "no .bin dir"
          echo "=== examples/icons/@kidd-cli/cli ==="
          ls -la examples/icons/node_modules/@kidd-cli/cli 2>&1 || echo "no @kidd-cli/cli"
          echo "=== packages/cli/dist/index.js ==="
          ls -la packages/cli/dist/index.js 2>&1 || echo "no dist/index.js"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
